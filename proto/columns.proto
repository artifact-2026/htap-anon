syntax = "proto3";

package data;

message Table {
    repeated Row rows = 1;
}

message Row {
  repeated Column columns = 1;
}

message Column {
  string name = 1;
  bytes value = 2;
}

message WideTable {
  repeated WideRow64 widerow64s = 1;
}

message WideRow64 {
  repeated bytes col64 = 1;
}

message NumTable {
  repeated NumRow32 numrow32s = 1;
}

message NumRow32 {
  repeated bytes numcol = 1;
}