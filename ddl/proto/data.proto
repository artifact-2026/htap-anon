syntax = "proto3";

package data;

// Represents a single column in the row
message Column {
  string name = 1;   // e.g., "field0"
  bytes value = 2;   // binary-safe value (use bytes instead of string if fixed-size random data)
}

// Represents one YCSB record
message Row {
  repeated Column columns = 1;   // All fields for this row
}
